name: Feature Request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's missing?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you think about?
    validations:
      required: false
  - type: dropdown
    id: workflow
    attributes:
      label: Related workflow
      options:
        - Init
        - Ingest
        - Query
        - Lint
        - New workflow
        - Install/Uninstall
        - Other
    validations:
      required: false
